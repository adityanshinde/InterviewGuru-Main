# Hobby plan: Vercel Cron is not available — use this workflow (or UptimeRobot, etc.).
# Pro plan: you can add crons in vercel.json instead; disable this workflow to avoid double pings.
# Repo → Settings → Secrets → Actions → add:
#   KEEP_WARM_URL = https://your-domain.com/api/cron/keep-warm
#   CRON_SECRET   = random string; set the same value as CRON_SECRET on Vercel

name: Keep warm

on:
  schedule:
    # Every 10 minutes UTC (GitHub may delay a few minutes). Use Vercel Cron for 5‑min pings.
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API + DB
        env:
          KEEP_WARM_URL: ${{ secrets.KEEP_WARM_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$KEEP_WARM_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Skip: set KEEP_WARM_URL and CRON_SECRET in repo Actions secrets."
            exit 0
          fi
          # Strip accidental newlines/CR from secret paste (GitHub UI); must match Vercel CRON_SECRET exactly.
          URL="$(printf '%s' "$KEEP_WARM_URL" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          SECRET="$(printf '%s' "$CRON_SECRET" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | tr -d '\r\n')"
          curl -fsS --max-time 60 \
            -H "Authorization: Bearer ${SECRET}" \
            -H "x-cron-secret: ${SECRET}" \
            "${URL}"
